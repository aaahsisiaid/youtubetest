<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Custom YouTube Player</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:
        radial-gradient(circle at top,#1d1d1d,#090909 70%);
    color:white;
    font-family:"Inter",sans-serif;
    height:100vh;
    overflow:hidden;
}

.app{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.player-card{
    width:min(1400px,95vw);
    border-radius:28px;
    overflow:hidden;
    background:rgba(20,20,20,.7);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.08);
    box-shadow:
        0 0 40px rgba(0,0,0,.5),
        inset 0 0 0 1px rgba(255,255,255,.03);
}

.video-wrap{
    position:relative;
    aspect-ratio:16/9;
    background:black;
    overflow:hidden;
}

#player{
    width:100%;
    height:100%;
    pointer-events:none;
}

.overlay{
    position:absolute;
    inset:0;
    background:
        linear-gradient(to top,
            rgba(0,0,0,.8),
            rgba(0,0,0,.2) 30%,
            transparent 60%);
    opacity:0;
    transition:.25s;
}

.video-wrap:hover .overlay{
    opacity:1;
}

.center-play{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    pointer-events:none;
}

.big-btn{
    width:110px;
    height:110px;
    border-radius:50%;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.15);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    opacity:0;
    transform:scale(.8);
    transition:.25s;
}

.video-wrap:hover .big-btn{
    opacity:1;
    transform:scale(1);
}

.bottom-ui{
    position:absolute;
    bottom:0;
    width:100%;
    padding:22px;
}

.progress-wrap{
    width:100%;
    height:6px;
    border-radius:999px;
    background:rgba(255,255,255,.15);
    cursor:pointer;
    overflow:hidden;
}

.progress{
    height:100%;
    width:0%;
    background:
        linear-gradient(90deg,#ff0033,#ff5f6d);
    border-radius:999px;
}

.controls{
    margin-top:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.left,
.right{
    display:flex;
    align-items:center;
    gap:14px;
}

.btn{
    width:44px;
    height:44px;
    border-radius:14px;
    border:none;
    background:rgba(255,255,255,.08);
    color:white;
    cursor:pointer;
    transition:.2s;
    font-size:18px;
}

.btn:hover{
    background:rgba(255,255,255,.16);
    transform:translateY(-2px);
}

.time{
    opacity:.8;
    font-size:14px;
}

.title{
    font-size:18px;
    font-weight:700;
    margin-bottom:6px;
}

.sub{
    font-size:13px;
    opacity:.6;
}

.top{
    position:absolute;
    top:0;
    width:100%;
    padding:24px;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
}

.glow{
    position:absolute;
    width:500px;
    height:500px;
    background:#ff004c33;
    filter:blur(120px);
    border-radius:50%;
    top:-200px;
    right:-120px;
    pointer-events:none;
}

.volume{
    width:100px;
}

input[type=range]{
    accent-color:#ff3355;
}

</style>
</head>
<body>

<div class="app">

<div class="player-card">

<div class="video-wrap" id="videoWrap">

<div class="glow"></div>

<div id="player"></div>

<div class="overlay">

<div class="top">

<div>
<div class="title">Custom UI Player</div>
<div class="sub">YouTube Embedded API</div>
</div>

</div>

<div class="center-play">
<div class="big-btn" id="centerBtn">
▶
</div>
</div>

<div class="bottom-ui">

<div class="progress-wrap" id="progressWrap">
<div class="progress" id="progress"></div>
</div>

<div class="controls">

<div class="left">

<button class="btn" id="playBtn">
▶
</button>

<button class="btn" id="muteBtn">
🔊
</button>

<input
class="volume"
type="range"
min="0"
max="100"
value="100"
id="volume"
>

<div class="time" id="time">
0:00 / 0:00
</div>

</div>

<div class="right">

<button class="btn" id="fullscreenBtn">
⛶
</button>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let player;
let playing = false;

function onYouTubeIframeAPIReady(){

    player = new YT.Player('player',{

        videoId:'dQw4w9WgXcQ',

        playerVars:{
            controls:0,
            modestbranding:1,
            rel:0,
            showinfo:0
        },

        events:{
            onReady:onReady
        }

    });

}

function onReady(){

    updateLoop();

}

function updateLoop(){

    setInterval(()=>{

        if(!player || !player.getDuration) return;

        const current = player.getCurrentTime();
        const duration = player.getDuration();

        const percent = (current/duration)*100;

        progress.style.width = percent+"%";

        time.innerText =
            format(current)
            +" / "+
            format(duration);

    },200);

}

function togglePlay(){

    if(playing){

        player.pauseVideo();

        playBtn.innerHTML="▶";
        centerBtn.innerHTML="▶";

    }else{

        player.playVideo();

        playBtn.innerHTML="⏸";
        centerBtn.innerHTML="⏸";

    }

    playing=!playing;

}

playBtn.onclick=togglePlay;
centerBtn.onclick=togglePlay;

videoWrap.onclick=(e)=>{

    if(
        e.target.id==="videoWrap" ||
        e.target.className==="overlay"
    ){
        togglePlay();
    }

};

muteBtn.onclick=()=>{

    if(player.isMuted()){

        player.unMute();
        muteBtn.innerHTML="🔊";

    }else{

        player.mute();
        muteBtn.innerHTML="🔇";

    }

};

volume.oninput=(e)=>{

    player.setVolume(e.target.value);

};

progressWrap.onclick=(e)=>{

    const rect =
        progressWrap.getBoundingClientRect();

    const x = e.clientX - rect.left;

    const percent = x / rect.width;

    const duration = player.getDuration();

    player.seekTo(duration * percent,true);

};

fullscreenBtn.onclick=()=>{

    if(!document.fullscreenElement){

        document.documentElement.requestFullscreen();

    }else{

        document.exitFullscreen();

    }

};

function format(sec){

    sec=Math.floor(sec);

    const m=Math.floor(sec/60);
    const s=sec%60;

    return `${m}:${String(s).padStart(2,"0")}`;

}

</script>

</body>
</html>
