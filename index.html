<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Ultra Custom YouTube Player</title>

<script src="https://www.youtube.com/iframe_api"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:
        Inter,
        system-ui,
        sans-serif;
}

/* 背景 */

.bg{
    position:fixed;
    inset:0;

    background:
        radial-gradient(circle at top left,
            #3d003d,
            transparent 30%),

        radial-gradient(circle at bottom right,
            #001a3d,
            transparent 30%),

        #050505;

    filter:blur(0px);
}

/* 全体 */

.player-shell{
    position:fixed;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* 動画本体 */

.player-wrap{

    position:relative;

    width:min(1600px,96vw);
    aspect-ratio:16/9;

    overflow:hidden;

    border-radius:34px;

    background:#000;

    box-shadow:
        0 30px 100px rgba(0,0,0,.8),
        inset 0 0 0 1px rgba(255,255,255,.05);

}

/* iframe巨大化 */

#player{

    position:absolute;

    inset:-14%;

    width:128%;
    height:128%;

    pointer-events:none;

    filter:
        contrast(1.04)
        saturate(1.08);

}

/* UI */

.ui{

    position:absolute;
    inset:0;

    z-index:20;

    display:flex;
    flex-direction:column;
    justify-content:space-between;

    background:
        linear-gradient(to top,
            rgba(0,0,0,.92),
            rgba(0,0,0,.3) 30%,
            transparent 60%);

    opacity:0;

    transition:.25s;
}

.player-wrap:hover .ui{
    opacity:1;
}

/* 上部 */

.topbar{

    padding:28px;

    display:flex;
    justify-content:space-between;
    align-items:flex-start;
}

.title{
    font-size:24px;
    font-weight:700;
}

.sub{
    opacity:.5;
    margin-top:6px;
}

/* 真ん中 */

.center{
    flex:1;

    display:flex;
    justify-content:center;
    align-items:center;
}

.bigplay{

    width:120px;
    height:120px;

    border-radius:999px;

    backdrop-filter:blur(20px);

    background:
        rgba(255,255,255,.08);

    border:
        1px solid rgba(255,255,255,.08);

    display:flex;
    justify-content:center;
    align-items:center;

    cursor:pointer;

    transition:.25s;

    font-size:48px;
}

.bigplay:hover{
    transform:scale(1.08);
}

/* 下 */

.bottom{

    padding:28px;
}

.progress-area{

    width:100%;
    height:8px;

    border-radius:999px;

    background:
        rgba(255,255,255,.12);

    overflow:hidden;

    cursor:pointer;
}

.progress{

    width:0%;
    height:100%;

    border-radius:999px;

    background:
        linear-gradient(
            90deg,
            #ff0055,
            #ff4d7d
        );
}

/* controls */

.controls{

    margin-top:20px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.left,
.right{
    display:flex;
    align-items:center;
    gap:14px;
}

.btn{

    width:48px;
    height:48px;

    border-radius:16px;

    border:none;

    background:
        rgba(255,255,255,.08);

    color:white;

    cursor:pointer;

    transition:.2s;

    font-size:18px;

    backdrop-filter:blur(10px);
}

.btn:hover{
    transform:translateY(-2px);
    background:rgba(255,255,255,.14);
}

.time{
    opacity:.7;
    font-size:14px;
}

.volume{
    width:100px;
}

/* マスク */

.edge-mask-top{

    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:90px;

    background:
        linear-gradient(
            to bottom,
            rgba(0,0,0,.95),
            transparent
        );

    z-index:11;

    pointer-events:none;
}

.edge-mask-right{

    position:absolute;
    top:0;
    right:0;

    width:130px;
    height:100%;

    background:
        linear-gradient(
            to left,
            rgba(0,0,0,.95),
            transparent
        );

    z-index:11;

    pointer-events:none;
}

.edge-mask-bottom{

    position:absolute;
    bottom:0;
    left:0;

    width:100%;
    height:90px;

    background:
        linear-gradient(
            to top,
            rgba(0,0,0,.95),
            transparent
        );

    z-index:11;

    pointer-events:none;
}

/* ローディング */

.loader{

    position:absolute;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:50;

    backdrop-filter:blur(10px);

    background:rgba(0,0,0,.6);

    transition:.4s;
}

.spinner{

    width:70px;
    height:70px;

    border-radius:50%;

    border:
        4px solid rgba(255,255,255,.15);

    border-top:
        4px solid white;

    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.hide{
    opacity:0;
    pointer-events:none;
}

input[type=range]{
    accent-color:#ff3366;
}

</style>
</head>
<body>

<div class="bg"></div>

<div class="player-shell">

<div class="player-wrap" id="wrap">

    <!-- マスク -->
    <div class="edge-mask-top"></div>
    <div class="edge-mask-right"></div>
    <div class="edge-mask-bottom"></div>

    <!-- プレイヤー -->
    <div id="player"></div>

    <!-- loading -->
    <div class="loader" id="loader">
        <div class="spinner"></div>
    </div>

    <!-- UI -->
    <div class="ui">

        <div class="topbar">

            <div>
                <div class="title">
                    Ultra Custom Player
                </div>

                <div class="sub">
                    YouTube API Hidden UI Mode
                </div>
            </div>

        </div>

        <div class="center">

            <div class="bigplay" id="bigplay">
                ▶
            </div>

        </div>

        <div class="bottom">

            <div
                class="progress-area"
                id="progressArea">

                <div
                    class="progress"
                    id="progress"></div>

            </div>

            <div class="controls">

                <div class="left">

                    <button class="btn" id="play">
                        ▶
                    </button>

                    <button class="btn" id="mute">
                        🔊
                    </button>

                    <input
                        class="volume"
                        type="range"
                        min="0"
                        max="100"
                        value="100"
                        id="volume">

                    <div
                        class="time"
                        id="time">

                        0:00 / 0:00

                    </div>

                </div>

                <div class="right">

                    <button
                        class="btn"
                        id="fullscreen">

                        ⛶

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

</div>

<script>

let player;
let playing=false;

function onYouTubeIframeAPIReady(){

    player =
        new YT.Player("player",{

        videoId:"dQw4w9WgXcQ",

        playerVars:{

            autoplay:1,

            controls:0,

            disablekb:1,

            fs:0,

            rel:0,

            modestbranding:1,

            playsinline:1,

            iv_load_policy:3,

            cc_load_policy:0,

            autohide:1,

            enablejsapi:1

        },

        events:{
            onReady:onReady
        }

    });

}

function onReady(){

    loader.classList.add("hide");

    updateLoop();

}

function updateLoop(){

    setInterval(()=>{

        if(!player?.getDuration) return;

        const cur =
            player.getCurrentTime();

        const dur =
            player.getDuration();

        const per =
            (cur/dur)*100;

        progress.style.width =
            per+"%";

        time.innerText =
            format(cur)
            +" / "+
            format(dur);

    },150);

}

function togglePlay(){

    if(playing){

        player.pauseVideo();

        play.innerHTML="▶";
        bigplay.innerHTML="▶";

    }else{

        player.playVideo();

        play.innerHTML="⏸";
        bigplay.innerHTML="⏸";

    }

    playing=!playing;

}

play.onclick=togglePlay;
bigplay.onclick=togglePlay;

mute.onclick=()=>{

    if(player.isMuted()){

        player.unMute();

        mute.innerHTML="🔊";

    }else{

        player.mute();

        mute.innerHTML="🔇";

    }

};

volume.oninput=(e)=>{

    player.setVolume(e.target.value);

};

progressArea.onclick=(e)=>{

    const rect =
        progressArea.getBoundingClientRect();

    const x =
        e.clientX - rect.left;

    const per =
        x / rect.width;

    player.seekTo(
        player.getDuration()*per,
        true
    );

};

fullscreen.onclick=()=>{

    if(!document.fullscreenElement){

        wrap.requestFullscreen();

    }else{

        document.exitFullscreen();

    }

};

function format(sec){

    sec=Math.floor(sec);

    const m=
        Math.floor(sec/60);

    const s=
        sec%60;

    return `${m}:${String(s).padStart(2,"0")}`;

}

</script>

</body>
</html>
