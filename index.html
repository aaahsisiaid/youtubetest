<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Ultra Custom YouTube Player</title>

<script src="https://www.youtube.com/iframe_api"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;

    -webkit-user-select:none;
    user-select:none;

    -webkit-touch-callout:none;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;

    font-family:
        Inter,
        system-ui,
        sans-serif;
}

body{
    background:
        radial-gradient(circle at top left,
            #3d003d,
            transparent 30%),

        radial-gradient(circle at bottom right,
            #001a3d,
            transparent 30%),

        #050505;
}

.player-shell{
    position:fixed;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}

.player-wrap{

    position:relative;

    width:min(1600px,96vw);
    aspect-ratio:16/9;

    overflow:hidden;

    border-radius:34px;

    background:#000;

    box-shadow:
        0 30px 100px rgba(0,0,0,.8),
        inset 0 0 0 1px rgba(255,255,255,.05);

    touch-action:manipulation;
}

#player{

    position:absolute;

    inset:-14%;

    width:128%;
    height:128%;

    pointer-events:none;

    filter:
        contrast(1.04)
        saturate(1.08);
}

.ui{

    position:absolute;
    inset:0;

    z-index:20;

    display:flex;
    flex-direction:column;
    justify-content:space-between;

    background:
        linear-gradient(to top,
            rgba(0,0,0,.92),
            rgba(0,0,0,.25) 30%,
            transparent 60%);

    opacity:0;

    transition:.25s;
}

.player-wrap:hover .ui,
.player-wrap.show-ui .ui{
    opacity:1;
}

/* top */

.topbar{

    padding:28px;

    display:flex;
    justify-content:space-between;
    align-items:flex-start;

    gap:20px;
}

.title{
    font-size:24px;
    font-weight:700;
    color:white;
}

.sub{
    opacity:.5;
    margin-top:6px;
    color:white;
}

.status{

    padding:10px 16px;

    border-radius:999px;

    background:
        rgba(255,255,255,.08);

    border:
        1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(20px);

    font-size:13px;
    letter-spacing:.08em;

    opacity:.85;

    transition:.2s;

    color:white;
}

.status.fast{

    background:
        rgba(255,0,80,.16);

    border:
        1px solid rgba(255,0,80,.35);

    box-shadow:
        0 0 30px rgba(255,0,80,.2);

    color:#ff7ba5;
}

/* center */

.center{

    flex:1;

    display:flex;
    justify-content:center;
    align-items:center;
}

.bigplay{

    width:120px;
    height:120px;

    border-radius:999px;

    backdrop-filter:blur(20px);

    background:
        rgba(255,255,255,.08);

    border:
        1px solid rgba(255,255,255,.08);

    display:flex;
    justify-content:center;
    align-items:center;

    cursor:pointer;

    transition:.25s;

    font-size:42px;

    color:white;
}

.bigplay:hover{
    transform:scale(1.08);
}

/* bottom */

.bottom{
    padding:28px;
}

.progress-area{

    width:100%;
    height:8px;

    border-radius:999px;

    background:
        rgba(255,255,255,.12);

    overflow:visible;

    cursor:pointer;

    position:relative;
}

.progress{

    width:0%;
    height:100%;

    border-radius:999px;

    background:
        linear-gradient(
            90deg,
            #ff0055,
            #ff4d7d
        );
}

/* preview */

.preview{

    position:absolute;

    bottom:22px;
    left:0;

    transform:translateX(-50%);

    width:220px;

    border-radius:18px;

    overflow:hidden;

    background:
        rgba(10,10,10,.95);

    border:
        1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(20px);

    opacity:0;

    transition:.12s;

    pointer-events:none;

    z-index:500;
}

.preview.show{
    opacity:1;
}

.preview img{

    width:100%;
    aspect-ratio:16/9;

    object-fit:cover;

    display:block;

    background:#000;
}

.previewTime{

    padding:10px;

    font-size:13px;

    text-align:center;

    background:
        rgba(255,255,255,.04);

    color:white;
}

/* controls */

.controls{

    margin-top:20px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.left,
.right{
    display:flex;
    align-items:center;
    gap:10px;
}

.btn{

    width:auto;
    min-width:48px;

    height:48px;

    padding:0 16px;

    border-radius:16px;

    border:none;

    background:
        rgba(255,255,255,.08);

    color:white;

    cursor:pointer;

    transition:.2s;

    font-size:15px;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;

    backdrop-filter:blur(10px);
}

.btn:hover{
    transform:translateY(-2px);
    background:rgba(255,255,255,.14);
}

.icon-btn{

    padding:0;

    width:48px;
}

.icon-btn svg{

    width:22px;
    height:22px;

    fill:white;

    display:block;
}

.time{
    opacity:.7;
    font-size:14px;
    color:white;
}

.volume{
    width:100px;
}

.speed{

    background:
        rgba(255,255,255,.08);

    color:white;

    border:none;

    height:42px;

    border-radius:12px;

    padding:0 12px;

    outline:none;

    font-size:14px;
}

.speed option{
    background:#111;
}

/* settings */

.settings{

    position:absolute;

    right:20px;
    bottom:95px;

    width:220px;

    background:
        rgba(15,15,15,.95);

    border:
        1px solid rgba(255,255,255,.08);

    border-radius:20px;

    padding:18px;

    z-index:100;

    backdrop-filter:blur(20px);

    display:none;
}

.settings.active{
    display:block;
}

.settings h3{
    margin-bottom:14px;
    font-size:16px;
    color:white;
}

.settings-row{
    margin-bottom:14px;
}

.settings-row label{
    display:block;
    margin-bottom:8px;
    opacity:.7;
    font-size:13px;
    color:white;
}

/* masks */

.edge-mask-top{

    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:90px;

    background:
        linear-gradient(
            to bottom,
            rgba(0,0,0,.95),
            transparent
        );

    z-index:11;
}

.edge-mask-right{

    position:absolute;
    top:0;
    right:0;

    width:130px;
    height:100%;

    background:
        linear-gradient(
            to left,
            rgba(0,0,0,.95),
            transparent
        );

    z-index:11;
}

.edge-mask-bottom{

    position:absolute;
    bottom:0;
    left:0;

    width:100%;
    height:90px;

    background:
        linear-gradient(
            to top,
            rgba(0,0,0,.95),
            transparent
        );

    z-index:11;
}

/* loader */

.loader{

    position:absolute;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:50;

    backdrop-filter:blur(10px);

    background:rgba(0,0,0,.6);

    transition:.4s;
}

.spinner{

    width:70px;
    height:70px;

    border-radius:50%;

    border:
        4px solid rgba(255,255,255,.15);

    border-top:
        4px solid white;

    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.hide{
    opacity:0;
    pointer-events:none;
}

input[type=range]{
    accent-color:#ff3366;
}

/* skip popup */

.skip-popup{

    position:absolute;

    top:50%;
    transform:translateY(-50%);

    padding:16px 24px;

    border-radius:20px;

    background:
        rgba(0,0,0,.72);

    backdrop-filter:blur(20px);

    font-size:22px;
    font-weight:700;

    opacity:0;

    transition:.2s;

    pointer-events:none;

    z-index:200;

    display:flex;
    align-items:center;
    gap:10px;

    color:white;
}

.skip-popup.show{
    opacity:1;
}

.skip-left{
    left:60px;
}

.skip-right{
    right:60px;
}

.skip-popup svg{

    width:28px;
    height:28px;

    fill:white;

    flex:none;
}

</style>
</head>
<body>

<div class="player-shell">

<div class="player-wrap" id="wrap">

    <div class="edge-mask-top"></div>
    <div class="edge-mask-right"></div>
    <div class="edge-mask-bottom"></div>

    <div id="player"></div>

    <div class="skip-popup skip-left" id="skipLeft">

        <svg viewBox="0 0 24 24">
            <path d="M11 18V6L2.5 12zm9 0V6l-8.5 6z"/>
        </svg>

        <span>15s</span>

    </div>

    <div class="skip-popup skip-right" id="skipRight">

        <span>15s</span>

        <svg viewBox="0 0 24 24">
            <path d="M4 18l8.5-6L4 6zm9 0l8.5-6L13 6z"/>
        </svg>

    </div>

    <div class="loader" id="loader">
        <div class="spinner"></div>
    </div>

    <div class="settings" id="settings">

        <h3>Settings</h3>

        <div class="settings-row">

            <label>Playback Speed</label>

            <select class="speed" id="speed">

                <option value="0.25">0.25x</option>
                <option value="0.5">0.5x</option>
                <option value="0.75">0.75x</option>
                <option value="1" selected>1x</option>
                <option value="1.25">1.25x</option>
                <option value="1.5">1.5x</option>
                <option value="1.75">1.75x</option>
                <option value="2">2x</option>

            </select>

        </div>

    </div>

    <div class="ui">

        <div class="topbar">

            <div>

                <div class="title">
                    Ultra Custom Player
                </div>

                <div class="sub">
                    Hidden YouTube UI
                </div>

            </div>

            <div class="status" id="status">
                NORMAL
            </div>

        </div>

        <div class="center">

            <div class="bigplay" id="bigplay">
                ▶
            </div>

        </div>

        <div class="bottom">

            <div
                class="progress-area"
                id="progressArea">

                <div
                    class="progress"
                    id="progress"></div>

                <div class="preview" id="preview">

                    <img id="previewImg">

                    <div
                        class="previewTime"
                        id="previewTime">

                        0:00

                    </div>

                </div>

            </div>

            <div class="controls">

                <div class="left">

                    <button class="btn icon-btn" id="play">

                        <svg id="playSvg" viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z"/>
                        </svg>

                    </button>

                    <button class="btn icon-btn" id="mute">

                        <svg id="muteSvg" viewBox="0 0 24 24">
                            <path d="M3 10v4h4l5 5V5L7 10z"/>
                        </svg>

                    </button>

                    <input
                        class="volume"
                        type="range"
                        min="0"
                        max="100"
                        value="100"
                        id="volume">

                    <div
                        class="time"
                        id="time">

                        0:00 / 0:00

                    </div>

                </div>

                <div class="right">

                    <button
                        class="btn"
                        id="settingsBtn">

                        Settings

                    </button>

                    <button
                        class="btn icon-btn"
                        id="fullscreen">

                        <svg viewBox="0 0 24 24">
                            <path d="M7 14H5v5h5v-2H7zm0-4h2V7h3V5H5v5zm10 7h-3v2h5v-5h-2zm0-12V5h-5v2h3v3h2z"/>
                        </svg>

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

</div>

<script>

document.addEventListener("contextmenu",e=>{
    e.preventDefault();
});

const videoId =
    "dQw4w9WgXcQ";

let player;
let playing=false;

let holdTimeout;
let holdSpeeding=false;
let prevSpeed=1;

let lastTap=0;
let lastSide="";
let previewTimer;

let dragging=false;
let isDraggingProgress=false;
let ignoreWrapClick=false;
let justClosedSettings=false;
    let uiTimeout;
let isHolding=false;

/* elements */

const loader =
    document.getElementById("loader");

const wrap =
    document.getElementById("wrap");

const progress =
    document.getElementById("progress");

const progressArea =
    document.getElementById("progressArea");

const time =
    document.getElementById("time");

const play =
    document.getElementById("play");

const mute =
    document.getElementById("mute");

const volume =
    document.getElementById("volume");

const fullscreen =
    document.getElementById("fullscreen");

const bigplay =
    document.getElementById("bigplay");

const settingsBtn =
    document.getElementById("settingsBtn");

const settings =
    document.getElementById("settings");

const speed =
    document.getElementById("speed");

const statusBox =
    document.getElementById("status");

const skipLeft =
    document.getElementById("skipLeft");

const skipRight =
    document.getElementById("skipRight");

const preview =
    document.getElementById("preview");

const previewImg =
    document.getElementById("previewImg");

const previewTime =
    document.getElementById("previewTime");

const playSvg =
    document.getElementById("playSvg");

const muteSvg =
    document.getElementById("muteSvg");

/* youtube */

function onYouTubeIframeAPIReady(){

    player =
        new YT.Player("player",{

        videoId:videoId,

        playerVars:{

            autoplay:0,

            controls:0,

            disablekb:1,

            fs:0,

            rel:0,

            modestbranding:1,

            playsinline:1,

            iv_load_policy:3,

            cc_load_policy:0,

            autohide:1,

            enablejsapi:1

        },

        events:{
            onReady:onReady
        }

    });

}

function onReady(){

    loader.classList.add("hide");

    updateLoop();

}

/* ui auto */

let uiTimer;

function showUI(){

    wrap.classList.add("show-ui");

    clearTimeout(uiTimeout);

    uiTimeout=setTimeout(()=>{

        /*
          設定開いてる時は消さない
        */

        if(
            !settings.classList.contains("active")
        ){

            wrap.classList.remove(
                "show-ui"
            );

        }

    },2500);

}
    [
"mousemove",
"touchstart",
"click",
"keydown"
].forEach(ev=>{

    document.addEventListener(
        ev,
        showUI
    );

});
    


/* loop */

function updateLoop(){

    setInterval(()=>{

        if(!player?.getDuration) return;

        if(isDraggingProgress) return;

        const cur =
            player.getCurrentTime();

        const dur =
            player.getDuration();

        const per =
            (cur/dur)*100;

        progress.style.width =
            per+"%";

        time.innerText =
            format(cur)
            +" / "+
            format(dur);

    },150);

}

/* play */

function playVideo(){

    player.playVideo();

    playing=true;

    playSvg.innerHTML=
        `<path d="M6 5h4v14H6zm8 0h4v14h-4z"/>`;

    bigplay.innerHTML="Ⅱ";

}

function pauseVideo(){

    player.pauseVideo();

    playing=false;

    playSvg.innerHTML=
        `<path d="M8 5v14l11-7z"/>`;

    bigplay.innerHTML="▶";

}

function togglePlay(){

    if(playing){

        pauseVideo();

    }else{

        playVideo();

    }

}

/* buttons */

play.addEventListener("click",(e)=>{

    e.stopPropagation();

    ignoreWrapClick=true;

    togglePlay();

    setTimeout(()=>{

        ignoreWrapClick=false;

    },50);

});

bigplay.addEventListener("click",(e)=>{

    e.stopPropagation();

    ignoreWrapClick=true;

    togglePlay();

    setTimeout(()=>{

        ignoreWrapClick=false;

    },50);

});

/* click */

wrap.addEventListener("click",(e)=>{

    if(ignoreWrapClick) return;

    if(isDraggingProgress) return;

    if(holdSpeeding) return;

    /*
      settings閉じた直後
    */

    if(justClosedSettings){

        justClosedSettings=false;
        return;

    }

    /*
      settings外クリック
    */

    if(
        settings.classList.contains("active") &&
        !settings.contains(e.target) &&
        !settingsBtn.contains(e.target)
    ){

        settings.classList.remove("active");

        justClosedSettings=true;

        return;
    }

    if(
        settings.contains(e.target) ||
        settingsBtn.contains(e.target) ||
        progressArea.contains(e.target) ||
        e.target.closest(".btn") ||
        e.target.closest(".speed") ||
        e.target.closest(".volume")
    ){
        return;
    }

    const now = Date.now();

    const rect =
        wrap.getBoundingClientRect();

    const x =
        e.clientX - rect.left;

    const side =
        x < rect.width/2
        ? "left"
        : "right";

    if(
        now-lastTap < 300 &&
        side===lastSide
    ){

        clearTimeout(previewTimer);

        if(side==="left"){

            player.seekTo(
                player.getCurrentTime()-15,
                true
            );

            showSkip(skipLeft);

        }else{

            player.seekTo(
                player.getCurrentTime()+15,
                true
            );

            showSkip(skipRight);

        }

        lastTap=0;

        return;
    }

    clearTimeout(previewTimer);

    previewTimer=setTimeout(()=>{

        if(
            !holdSpeeding &&
            !isDraggingProgress
        ){

            togglePlay();

        }

    },310);

    lastTap=now;
    lastSide=side;

});

/* popup */

function showSkip(el){

    el.classList.add("show");

    setTimeout(()=>{

        el.classList.remove("show");

    },450);

}

/* long press */
function startHold(e){

    if(
        e.target.closest(".controls") ||
        e.target.closest(".settings") ||
        e.target.closest(".progress-area")
    ){
        return;
    }

    isHolding=true;

    holdTimeout=setTimeout(()=>{

        holdSpeeding=true;

        prevSpeed=
            player.getPlaybackRate();

        player.setPlaybackRate(2);

        updateStatus(2);

    },300);

}


function stopHold(){

    clearTimeout(holdTimeout);

    if(holdSpeeding){

        holdSpeeding=false;

        player.setPlaybackRate(
            prevSpeed
        );

        updateStatus(prevSpeed);

        /*
          離した瞬間のclick無効
        */

        ignoreWrapClick=true;

        setTimeout(()=>{

            ignoreWrapClick=false;

        },200);

    }

    isHolding=false;

}
wrap.addEventListener("mousedown",startHold);
wrap.addEventListener("mouseup",stopHold);
wrap.addEventListener("mouseleave",stopHold);

wrap.addEventListener("touchstart",startHold);
wrap.addEventListener("touchend",stopHold);

/* mute */

mute.onclick=()=>{

    if(player.isMuted()){

        player.unMute();

        muteSvg.innerHTML=
            `<path d="M3 10v4h4l5 5V5L7 10z"/>`;

    }else{

        player.mute();

        muteSvg.innerHTML=
            `<path d="M16 9l5 5m0-5l-5 5M3 10v4h4l5 5V5L7 10z"
             stroke="white"
             stroke-width="2"
             fill="none"
             stroke-linecap="round"/>`;

    }

};

/* volume */

volume.oninput=(e)=>{

    player.setVolume(e.target.value);

};

/* progress */

function seekFromEvent(e){

    const rect =
        progressArea.getBoundingClientRect();

    const clientX =
        e.touches
        ? e.touches[0].clientX
        : e.clientX;

    const x =
        clientX - rect.left;

    const per =
        Math.max(
            0,
            Math.min(1,x/rect.width)
        );

    const seekTime =
        player.getDuration()*per;

    progress.style.width =
        (per*100)+"%";

    time.innerText =
        format(seekTime)
        +" / "+
        format(player.getDuration());

    player.seekTo(
        seekTime,
        true
    );

}

progressArea.addEventListener("mousedown",(e)=>{

    e.stopPropagation();

    isDraggingProgress=true;

    seekFromEvent(e);

});

document.addEventListener("mousemove",(e)=>{

    if(!isDraggingProgress) return;

    seekFromEvent(e);

});

document.addEventListener("mouseup",()=>{

    if(isDraggingProgress){

        setTimeout(()=>{

            isDraggingProgress=false;

        },20);

    }

});

progressArea.addEventListener("touchstart",(e)=>{

    e.stopPropagation();

    isDraggingProgress=true;

    seekFromEvent(e);

});

document.addEventListener("touchmove",(e)=>{

    if(!isDraggingProgress) return;

    seekFromEvent(e);

});

document.addEventListener("touchend",()=>{

    if(isDraggingProgress){

        setTimeout(()=>{

            isDraggingProgress=false;

        },20);

    }

});

/* preview */

progressArea.addEventListener("mousemove",(e)=>{

    const rect =
        progressArea.getBoundingClientRect();

    const x =
        e.clientX - rect.left;

    const percent =
        Math.max(
            0,
            Math.min(1,x/rect.width)
        );

    const duration =
        player.getDuration();

    const previewSec =
        duration * percent;

    preview.classList.add("show");

    preview.style.left =
        x+"px";

    previewTime.innerHTML =
        format(previewSec);

    const frame =
        Math.floor(previewSec/5);

    previewImg.src =
        `https://i.ytimg.com/sb/${videoId}/storyboard3_L2/M${frame}.jpg`;

});

progressArea.addEventListener("mouseleave",()=>{

    preview.classList.remove("show");

});

/* fullscreen */

fullscreen.onclick=async()=>{

    if(!document.fullscreenElement){

        await wrap.requestFullscreen();

        if(
            screen.orientation &&
            screen.orientation.lock
        ){

            try{

                await screen.orientation.lock(
                    "landscape"
                );

            }catch(err){}

        }

    }else{

        document.exitFullscreen();

    }

};

/* settings */

settingsBtn.onclick=(e)=>{

    e.stopPropagation();

    settings.classList.toggle("active");

};

/* speed */

speed.onchange=(e)=>{

    const val =
        Number(e.target.value);

    player.setPlaybackRate(val);

    updateStatus(val);

};

/* status */

function updateStatus(speed){

    if(speed===1){

        statusBox.innerHTML=
            "NORMAL";

        statusBox.classList.remove("fast");

    }else{

        statusBox.innerHTML=
            `${speed}x SPEED`;

        statusBox.classList.add("fast");

    }

}

/* keyboard */

document.addEventListener("keydown",(e)=>{

    if(e.code==="Space"){

        e.preventDefault();

        togglePlay();

    }

    if(e.code==="ArrowRight"){

        player.seekTo(
            player.getCurrentTime()+5,
            true
        );

    }

    if(e.code==="ArrowLeft"){

        player.seekTo(
            player.getCurrentTime()-5,
            true
        );

    }

    if(e.code==="KeyM"){

        mute.click();

    }

    if(e.code==="KeyF"){

        fullscreen.click();

    }

});

/* format */

function format(sec){

    sec=Math.floor(sec);

    const m=
        Math.floor(sec/60);

    const s=
        sec%60;

    return `${m}:${String(s).padStart(2,"0")}`;

}
