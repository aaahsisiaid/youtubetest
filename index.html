<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Custom Video Player</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;

    -webkit-user-select:none;
    user-select:none;

    -webkit-touch-callout:none;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#050505;

    font-family:
        Inter,
        system-ui,
        sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;

    background:
        radial-gradient(circle at top left,
            #330033,
            transparent 30%),

        radial-gradient(circle at bottom right,
            #001133,
            transparent 30%),

        #050505;
}

.player-wrap{

    position:relative;

    width:min(1600px,96vw);
    aspect-ratio:16/9;

    border-radius:30px;

    overflow:hidden;

    background:#000;

    box-shadow:
        0 30px 100px rgba(0,0,0,.8);
}

video{

    width:100%;
    height:100%;

    object-fit:cover;

    background:#000;
}

/* overlay */

.overlay{

    position:absolute;
    inset:0;

    display:flex;
    flex-direction:column;
    justify-content:space-between;

    background:
        linear-gradient(
            to top,
            rgba(0,0,0,.9),
            rgba(0,0,0,.2) 35%,
            transparent 60%
        );

    opacity:0;

    transition:.25s;
}

.player-wrap:hover .overlay{
    opacity:1;
}

/* top */

.topbar{

    padding:26px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.title{
    font-size:24px;
    font-weight:700;
}

.status{

    padding:10px 16px;

    border-radius:999px;

    background:
        rgba(255,255,255,.08);

    backdrop-filter:blur(20px);

    border:
        1px solid rgba(255,255,255,.08);

    font-size:13px;
}

/* center */

.center{

    flex:1;

    display:flex;
    justify-content:center;
    align-items:center;
}

.bigplay{

    width:110px;
    height:110px;

    border-radius:999px;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
        rgba(255,255,255,.08);

    backdrop-filter:blur(20px);

    border:
        1px solid rgba(255,255,255,.08);

    cursor:pointer;

    transition:.2s;

    font-size:40px;
}

.bigplay:hover{
    transform:scale(1.08);
}

/* bottom */

.bottom{
    padding:24px;
}

/* progress */

.progress-wrap{

    position:relative;

    width:100%;
    height:8px;

    border-radius:999px;

    background:
        rgba(255,255,255,.14);

    cursor:pointer;
}

.progress{

    width:0%;
    height:100%;

    border-radius:999px;

    background:
        linear-gradient(
            90deg,
            #ff0055,
            #ff4477
        );
}

/* preview */

.preview{

    position:absolute;

    bottom:24px;
    left:0;

    transform:translateX(-50%);

    width:220px;

    overflow:hidden;

    border-radius:18px;

    background:
        rgba(10,10,10,.96);

    border:
        1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(20px);

    opacity:0;

    transition:.12s;

    pointer-events:none;

    z-index:200;
}

.preview.show{
    opacity:1;
}

.preview canvas{

    width:100%;
    display:block;
}

.preview-time{

    padding:10px;

    text-align:center;

    font-size:13px;

    background:
        rgba(255,255,255,.04);
}

/* controls */

.controls{

    margin-top:20px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.left,
.right{

    display:flex;
    align-items:center;
    gap:10px;
}

.btn{

    min-width:48px;
    height:48px;

    padding:0 16px;

    border:none;

    border-radius:16px;

    background:
        rgba(255,255,255,.08);

    color:white;

    cursor:pointer;

    backdrop-filter:blur(10px);

    transition:.2s;

    font-size:15px;
}

.btn:hover{

    transform:translateY(-2px);

    background:
        rgba(255,255,255,.14);
}

.time{

    font-size:14px;

    opacity:.75;
}

.volume{
    width:100px;
}

input[type=range]{
    accent-color:#ff3366;
}

/* settings */

.settings{

    position:absolute;

    right:20px;
    bottom:100px;

    width:220px;

    border-radius:20px;

    padding:18px;

    background:
        rgba(15,15,15,.96);

    border:
        1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(20px);

    display:none;

    z-index:300;
}

.settings.active{
    display:block;
}

.settings label{

    display:block;

    margin-bottom:8px;

    opacity:.7;

    font-size:13px;
}

.speed{

    width:100%;

    height:42px;

    border:none;

    border-radius:12px;

    background:
        rgba(255,255,255,.08);

    color:white;

    padding:0 12px;
}

/* loader */

.loader{

    position:absolute;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
        rgba(0,0,0,.6);

    backdrop-filter:blur(10px);

    z-index:100;
}

.spinner{

    width:70px;
    height:70px;

    border-radius:50%;

    border:
        4px solid rgba(255,255,255,.12);

    border-top:
        4px solid white;

    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.hide{
    opacity:0;
    pointer-events:none;
}

/* skip */

.skip{

    position:absolute;

    top:50%;

    transform:translateY(-50%);

    padding:16px 22px;

    border-radius:18px;

    background:
        rgba(0,0,0,.72);

    backdrop-filter:blur(20px);

    opacity:0;

    transition:.2s;

    pointer-events:none;

    font-size:22px;
    font-weight:700;
}

.skip.show{
    opacity:1;
}

.skip.left{
    left:50px;
}

.skip.right{
    right:50px;
}

</style>
</head>
<body>

<div class="player-wrap" id="wrap">

    <!-- IMPORTANT -->
    <!-- Cloudflare Worker等から取得したmp4 -->

    <video
        id="video"
        preload="metadata"
        playsinline>

        <source
            src="YOUR_VIDEO_URL.mp4"
            type="video/mp4">

    </video>

    <!-- loader -->

    <div class="loader" id="loader">
        <div class="spinner"></div>
    </div>

    <!-- skip -->

    <div class="skip left" id="skipLeft">
        -15s
    </div>

    <div class="skip right" id="skipRight">
        +15s
    </div>

    <!-- settings -->

    <div class="settings" id="settings">

        <label>Playback Speed</label>

        <select class="speed" id="speed">

            <option value="0.25">0.25x</option>
            <option value="0.5">0.5x</option>
            <option value="0.75">0.75x</option>
            <option value="1" selected>1x</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
            <option value="1.75">1.75x</option>
            <option value="2">2x</option>

        </select>

    </div>

    <!-- overlay -->

    <div class="overlay">

        <!-- top -->

        <div class="topbar">

            <div class="title">
                Custom Player
            </div>

            <div class="status" id="status">
                NORMAL
            </div>

        </div>

        <!-- center -->

        <div class="center">

            <div class="bigplay" id="bigplay">
                ▶
            </div>

        </div>

        <!-- bottom -->

        <div class="bottom">

            <!-- progress -->

            <div class="progress-wrap" id="progressWrap">

                <div class="progress" id="progress"></div>

                <!-- preview -->

                <div class="preview" id="preview">

                    <canvas
                        id="previewCanvas"
                        width="320"
                        height="180">

                    </canvas>

                    <div
                        class="preview-time"
                        id="previewTime">

                        0:00

                    </div>

                </div>

            </div>

            <!-- controls -->

            <div class="controls">

                <div class="left">

                    <button class="btn" id="play">
                        ▶
                    </button>

                    <button class="btn" id="mute">
                        🔊
                    </button>

                    <input
                        class="volume"
                        id="volume"
                        type="range"
                        min="0"
                        max="1"
                        step="0.01"
                        value="1">

                    <div class="time" id="time">
                        0:00 / 0:00
                    </div>

                </div>

                <div class="right">

                    <button
                        class="btn"
                        id="settingsBtn">

                        ⚙ Settings

                    </button>

                    <button
                        class="btn"
                        id="fullscreen">

                        ⛶ Full

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

/* disable */

document.addEventListener("contextmenu",e=>{
    e.preventDefault();
});

/* elements */

const video =
    document.getElementById("video");

const loader =
    document.getElementById("loader");

const progress =
    document.getElementById("progress");

const progressWrap =
    document.getElementById("progressWrap");

const play =
    document.getElementById("play");

const bigplay =
    document.getElementById("bigplay");

const mute =
    document.getElementById("mute");

const volume =
    document.getElementById("volume");

const time =
    document.getElementById("time");

const wrap =
    document.getElementById("wrap");

const fullscreen =
    document.getElementById("fullscreen");

const settings =
    document.getElementById("settings");

const settingsBtn =
    document.getElementById("settingsBtn");

const speed =
    document.getElementById("speed");

const status =
    document.getElementById("status");

const skipLeft =
    document.getElementById("skipLeft");

const skipRight =
    document.getElementById("skipRight");

const preview =
    document.getElementById("preview");

const previewCanvas =
    document.getElementById("previewCanvas");

const previewCtx =
    previewCanvas.getContext("2d");

const previewTime =
    document.getElementById("previewTime");

/* state */

let lastTap=0;
let lastSide="";
let singleClickTimer;

let holdTimeout;
let holdTriggered=false;
let holdSpeeding=false;
let prevSpeed=1;

/* loader */

video.addEventListener("loadeddata",()=>{

    loader.classList.add("hide");

});

/* play */

function playVideo(){

    video.play();

    play.innerHTML="⏸";
    bigplay.innerHTML="⏸";

}

function pauseVideo(){

    video.pause();

    play.innerHTML="▶";
    bigplay.innerHTML="▶";

}

function togglePlay(){

    if(video.paused){

        playVideo();

    }else{

        pauseVideo();

    }

}

play.onclick=togglePlay;
bigplay.onclick=togglePlay;

/* update */

setInterval(()=>{

    if(!video.duration) return;

    const per =
        (video.currentTime/video.duration)*100;

    progress.style.width =
        per+"%";

    time.innerHTML =
        format(video.currentTime)
        +" / "+
        format(video.duration);

},100);

/* progress */

progressWrap.onclick=(e)=>{

    const rect =
        progressWrap.getBoundingClientRect();

    const x =
        e.clientX - rect.left;

    const per =
        x/rect.width;

    video.currentTime =
        video.duration*per;

};

/* preview */

progressWrap.addEventListener("mousemove",(e)=>{

    if(!video.duration) return;

    const rect =
        progressWrap.getBoundingClientRect();

    const x =
        e.clientX - rect.left;

    const per =
        Math.max(
            0,
            Math.min(1,x/rect.width)
        );

    const previewSec =
        video.duration * per;

    preview.classList.add("show");

    preview.style.left =
        x+"px";

    previewTime.innerHTML =
        format(previewSec);

    /*
      現在フレーム取得
    */

    const oldTime =
        video.currentTime;

    const wasPaused =
        video.paused;

    video.currentTime =
        previewSec;

    video.addEventListener(
        "seeked",
        function drawPreview(){

            previewCtx.drawImage(
                video,
                0,
                0,
                previewCanvas.width,
                previewCanvas.height
            );

            if(wasPaused){

                video.pause();

            }

            video.currentTime =
                oldTime;

            video.removeEventListener(
                "seeked",
                drawPreview
            );

        },
        {once:true}
    );

});

progressWrap.addEventListener("mouseleave",()=>{

    preview.classList.remove("show");

});

/* volume */

volume.oninput=(e)=>{

    video.volume =
        e.target.value;

};

/* mute */

mute.onclick=()=>{

    video.muted =
        !video.muted;

    mute.innerHTML =
        video.muted
        ? "🔇"
        : "🔊";

};

/* fullscreen */

fullscreen.onclick=()=>{

    if(!document.fullscreenElement){

        wrap.requestFullscreen();

    }else{

        document.exitFullscreen();

    }

};

/* settings */

settingsBtn.onclick=(e)=>{

    e.stopPropagation();

    settings.classList.toggle("active");

};

document.addEventListener("click",(e)=>{

    if(
        !settings.contains(e.target) &&
        !settingsBtn.contains(e.target)
    ){
        settings.classList.remove("active");
    }

});

/* speed */

speed.onchange=(e)=>{

    video.playbackRate =
        Number(e.target.value);

    updateStatus(
        video.playbackRate
    );

};

function updateStatus(speed){

    if(speed===1){

        status.innerHTML=
            "NORMAL";

    }else{

        status.innerHTML=
            speed+"x SPEED";

    }

}

/* skip popup */

function showSkip(el){

    el.classList.add("show");

    setTimeout(()=>{

        el.classList.remove("show");

    },400);

}

/* click */

wrap.addEventListener("click",(e)=>{

    if(holdTriggered){
        holdTriggered=false;
        return;
    }

    if(
        progressWrap.contains(e.target) ||
        e.target.closest(".btn") ||
        e.target.closest(".volume") ||
        settings.contains(e.target)
    ){
        return;
    }

    const now =
        Date.now();

    const rect =
        wrap.getBoundingClientRect();

    const x =
        e.clientX - rect.left;

    const side =
        x < rect.width/2
        ? "left"
        : "right";

    /* double */

    if(
        now-lastTap < 300 &&
        side===lastSide
    ){

        clearTimeout(singleClickTimer);

        if(side==="left"){

            video.currentTime -=15;

            showSkip(skipLeft);

        }else{

            video.currentTime +=15;

            showSkip(skipRight);

        }

        lastTap=0;

        return;
    }

    /* single */

    singleClickTimer=setTimeout(()=>{

        togglePlay();

    },310);

    lastTap=now;
    lastSide=side;

});

/* long press */

function startHold(){

    holdTriggered=false;

    holdTimeout=setTimeout(()=>{

        holdTriggered=true;

        holdSpeeding=true;

        prevSpeed=
            video.playbackRate;

        video.playbackRate=2;

        updateStatus(2);

    },300);

}

function stopHold(){

    clearTimeout(holdTimeout);

    if(holdSpeeding){

        holdSpeeding=false;

        video.playbackRate=
            prevSpeed;

        updateStatus(prevSpeed);

    }

}

wrap.addEventListener(
    "mousedown",
    startHold
);

wrap.addEventListener(
    "mouseup",
    stopHold
);

wrap.addEventListener(
    "mouseleave",
    stopHold
);

wrap.addEventListener(
    "touchstart",
    startHold
);

wrap.addEventListener(
    "touchend",
    stopHold
);

/* keyboard */

document.addEventListener("keydown",(e)=>{

    if(e.code==="Space"){

        e.preventDefault();

        togglePlay();

    }

    if(e.code==="ArrowRight"){

        video.currentTime+=5;

    }

    if(e.code==="ArrowLeft"){

        video.currentTime-=5;

    }

    if(e.code==="KeyF"){

        fullscreen.click();

    }

    if(e.code==="KeyM"){

        mute.click();

    }

});

/* format */

function format(sec){

    sec=Math.floor(sec);

    const m=
        Math.floor(sec/60);

    const s=
        sec%60;

    return `${m}:${String(s).padStart(2,"0")}`;

}

</script>

</body>
</html>
