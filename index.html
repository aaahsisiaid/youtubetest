<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Custom Player</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
}

#playerWrap{
    position:relative;
    width:900px;
    margin:auto;
    margin-top:40px;
}

#player{
    width:100%;
    aspect-ratio:16/9;
}

.controls{
    display:flex;
    gap:10px;
    padding:10px;
    background:#1c1c1c;
}

button{
    background:#333;
    color:white;
    border:none;
    padding:10px;
    cursor:pointer;
}

#seek{
    flex:1;
}
</style>
</head>
<body>

<div id="playerWrap">

    <div id="player"></div>

    <div class="controls">
        <button onclick="playVideo()">▶</button>
        <button onclick="pauseVideo()">⏸</button>

        <input type="range" id="seek" min="0" max="100" value="0">

        <span id="time">0:00</span>
    </div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;

function onYouTubeIframeAPIReady(){

    player = new YT.Player('player', {
        videoId: 'dQw4w9WgXcQ',
        playerVars:{
            controls:0,
            modestbranding:1
        },
        events:{
            onReady:onReady
        }
    });

}

function onReady(){

    setInterval(()=>{

        if(!player || !player.getDuration) return;

        const current = player.getCurrentTime();
        const duration = player.getDuration();

        const percent = (current/duration)*100;

        document.getElementById("seek").value = percent;

        document.getElementById("time").innerText =
            format(current);

    },500);

}

function playVideo(){
    player.playVideo();
}

function pauseVideo(){
    player.pauseVideo();
}

document.getElementById("seek").addEventListener("input",e=>{

    const duration = player.getDuration();

    player.seekTo(
        (e.target.value/100)*duration,
        true
    );

});

function format(sec){

    sec = Math.floor(sec);

    const m = Math.floor(sec/60);
    const s = sec%60;

    return `${m}:${String(s).padStart(2,"0")}`;
}
</script>

</body>
</html>
