<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Ultra Custom YouTube Player</title>

<script src="https://www.youtube.com/iframe_api"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:
        Inter,
        system-ui,
        sans-serif;
}

body{
    background:
        radial-gradient(circle at top left,
            #3d003d,
            transparent 30%),

        radial-gradient(circle at bottom right,
            #001a3d,
            transparent 30%),

        #050505;
}

/* 全体 */

.player-shell{
    position:fixed;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}

/* 動画 */

.player-wrap{

    position:relative;

    width:min(1600px,96vw);
    aspect-ratio:16/9;

    overflow:hidden;

    border-radius:34px;

    background:#000;

    box-shadow:
        0 30px 100px rgba(0,0,0,.8),
        inset 0 0 0 1px rgba(255,255,255,.05);

}

/* iframe */

#player{

    position:absolute;

    inset:-14%;

    width:128%;
    height:128%;

    pointer-events:none;

    filter:
        contrast(1.04)
        saturate(1.08);

}

/* UI */

.ui{

    position:absolute;
    inset:0;

    z-index:20;

    display:flex;
    flex-direction:column;
    justify-content:space-between;

    background:
        linear-gradient(to top,
            rgba(0,0,0,.92),
            rgba(0,0,0,.25) 30%,
            transparent 60%);

    opacity:0;

    transition:.25s;
}

.player-wrap:hover .ui{
    opacity:1;
}

/* top */

.topbar{

    padding:28px;

    display:flex;
    justify-content:space-between;
    align-items:flex-start;

    gap:20px;
}

.title{
    font-size:24px;
    font-weight:700;
}

.sub{
    opacity:.5;
    margin-top:6px;
}

/* status */

.status{

    padding:10px 16px;

    border-radius:999px;

    background:
        rgba(255,255,255,.08);

    border:
        1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(20px);

    font-size:13px;
    letter-spacing:.08em;

    opacity:.85;

    transition:.2s;
}

.status.fast{

    background:
        rgba(255,0,80,.16);

    border:
        1px solid rgba(255,0,80,.35);

    box-shadow:
        0 0 30px rgba(255,0,80,.2);

    color:#ff7ba5;
}

/* center */

.center{

    flex:1;

    display:flex;
    justify-content:center;
    align-items:center;
}

.bigplay{

    width:120px;
    height:120px;

    border-radius:999px;

    backdrop-filter:blur(20px);

    background:
        rgba(255,255,255,.08);

    border:
        1px solid rgba(255,255,255,.08);

    display:flex;
    justify-content:center;
    align-items:center;

    cursor:pointer;

    transition:.25s;

    font-size:48px;

    user-select:none;
}

.bigplay:hover{
    transform:scale(1.08);
}

/* bottom */

.bottom{
    padding:28px;
}

.progress-area{

    width:100%;
    height:8px;

    border-radius:999px;

    background:
        rgba(255,255,255,.12);

    overflow:hidden;

    cursor:pointer;

    position:relative;
}

.progress{

    width:0%;
    height:100%;

    border-radius:999px;

    background:
        linear-gradient(
            90deg,
            #ff0055,
            #ff4d7d
        );
}

/* controls */

.controls{

    margin-top:20px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.left,
.right{
    display:flex;
    align-items:center;
    gap:10px;
}

.btn{

    width:auto;
    min-width:48px;

    height:48px;

    padding:0 16px;

    border-radius:16px;

    border:none;

    background:
        rgba(255,255,255,.08);

    color:white;

    cursor:pointer;

    transition:.2s;

    font-size:15px;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;

    backdrop-filter:blur(10px);

    user-select:none;
}

.btn:hover{
    transform:translateY(-2px);
    background:rgba(255,255,255,.14);
}

.time{
    opacity:.7;
    font-size:14px;
}

.volume{
    width:100px;
}

/* speed */

.speed{

    background:
        rgba(255,255,255,.08);

    color:white;

    border:none;

    height:42px;

    border-radius:12px;

    padding:0 12px;

    outline:none;

    font-size:14px;
}

.speed option{
    background:#111;
}

/* settings */

.settings{

    position:absolute;

    right:20px;
    bottom:95px;

    width:220px;

    background:
        rgba(15,15,15,.95);

    border:
        1px solid rgba(255,255,255,.08);

    border-radius:20px;

    padding:18px;

    z-index:100;

    backdrop-filter:blur(20px);

    display:none;
}

.settings.active{
    display:block;
}

.settings h3{
    margin-bottom:14px;
    font-size:16px;
}

.settings-row{
    margin-bottom:14px;
}

.settings-row label{
    display:block;
    margin-bottom:8px;
    opacity:.7;
    font-size:13px;
}

/* mask */

.edge-mask-top{

    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:90px;

    background:
        linear-gradient(
            to bottom,
            rgba(0,0,0,.95),
            transparent
        );

    z-index:11;

    pointer-events:none;
}

.edge-mask-right{

    position:absolute;
    top:0;
    right:0;

    width:130px;
    height:100%;

    background:
        linear-gradient(
            to left,
            rgba(0,0,0,.95),
            transparent
        );

    z-index:11;

    pointer-events:none;
}

.edge-mask-bottom{

    position:absolute;
    bottom:0;
    left:0;

    width:100%;
    height:90px;

    background:
        linear-gradient(
            to top,
            rgba(0,0,0,.95),
            transparent
        );

    z-index:11;

    pointer-events:none;
}

/* loader */

.loader{

    position:absolute;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:50;

    backdrop-filter:blur(10px);

    background:rgba(0,0,0,.6);

    transition:.4s;
}

.spinner{

    width:70px;
    height:70px;

    border-radius:50%;

    border:
        4px solid rgba(255,255,255,.15);

    border-top:
        4px solid white;

    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.hide{
    opacity:0;
    pointer-events:none;
}

input[type=range]{
    accent-color:#ff3366;
}

/* mobile */

@media (max-width:700px){

    .controls{

        flex-direction:column;
        align-items:flex-start;
        gap:14px;
    }

    .left,
    .right{

        width:100%;
        flex-wrap:wrap;
    }

    .topbar{

        flex-direction:column;
        align-items:flex-start;
    }

}

</style>
</head>
<body>

<div class="player-shell">

<div class="player-wrap" id="wrap">

    <!-- mask -->
    <div class="edge-mask-top"></div>
    <div class="edge-mask-right"></div>
    <div class="edge-mask-bottom"></div>

    <!-- player -->
    <div id="player"></div>

    <!-- loader -->
    <div class="loader" id="loader">
        <div class="spinner"></div>
    </div>

    <!-- settings -->
    <div class="settings" id="settings">

        <h3>Settings</h3>

        <div class="settings-row">

            <label>Playback Speed</label>

            <select class="speed" id="speed">

                <option value="0.25">0.25x</option>
                <option value="0.5">0.5x</option>
                <option value="0.75">0.75x</option>
                <option value="1" selected>1x</option>
                <option value="1.25">1.25x</option>
                <option value="1.5">1.5x</option>
                <option value="1.75">1.75x</option>
                <option value="2">2x</option>

            </select>

        </div>

    </div>

    <!-- UI -->
    <div class="ui">

        <div class="topbar">

            <div>

                <div class="title">
                    Ultra Custom Player
                </div>

                <div class="sub">
                    Hidden YouTube UI
                </div>

            </div>

            <div class="status" id="status">
                NORMAL
            </div>

        </div>

        <div class="center">

            <div class="bigplay" id="bigplay">
                ▶
            </div>

        </div>

        <div class="bottom">

            <div
                class="progress-area"
                id="progressArea">

                <div
                    class="progress"
                    id="progress"></div>

            </div>

            <div class="controls">

                <div class="left">

                    <button class="btn" id="play">
                        <span id="playIcon">▶</span>
                    </button>

                    <button class="btn" id="mute">
                        <span id="muteIcon">🔊</span>
                    </button>

                    <input
                        class="volume"
                        type="range"
                        min="0"
                        max="100"
                        value="100"
                        id="volume">

                    <div
                        class="time"
                        id="time">

                        0:00 / 0:00

                    </div>

                </div>

                <div class="right">

                    <button
                        class="btn"
                        id="settingsBtn">

                        ⚙ Settings

                    </button>

                    <button
                        class="btn"
                        id="fullscreen">

                        ⛶ Full

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

</div>

<script>

let player;
let playing=false;

let holdTimeout;
let holdSpeeding=false;
let prevSpeed=1;

/* elements */

const loader =
    document.getElementById("loader");

const wrap =
    document.getElementById("wrap");

const progress =
    document.getElementById("progress");

const progressArea =
    document.getElementById("progressArea");

const time =
    document.getElementById("time");

const play =
    document.getElementById("play");

const mute =
    document.getElementById("mute");

const volume =
    document.getElementById("volume");

const fullscreen =
    document.getElementById("fullscreen");

const bigplay =
    document.getElementById("bigplay");

const settingsBtn =
    document.getElementById("settingsBtn");

const settings =
    document.getElementById("settings");

const speed =
    document.getElementById("speed");

const statusBox =
    document.getElementById("status");

const playIcon =
    document.getElementById("playIcon");

const muteIcon =
    document.getElementById("muteIcon");

/* youtube */

function onYouTubeIframeAPIReady(){

    player =
        new YT.Player("player",{

        videoId:"dQw4w9WgXcQ",

        playerVars:{

            autoplay:0,

            controls:0,

            disablekb:1,

            fs:0,

            rel:0,

            modestbranding:1,

            playsinline:1,

            iv_load_policy:3,

            cc_load_policy:0,

            autohide:1,

            enablejsapi:1

        },

        events:{
            onReady:onReady
        }

    });

}

function onReady(){

    loader.classList.add("hide");

    updateLoop();

}

/* loop */

function updateLoop(){

    setInterval(()=>{

        if(!player?.getDuration) return;

        const cur =
            player.getCurrentTime();

        const dur =
            player.getDuration();

        const per =
            (cur/dur)*100;

        progress.style.width =
            per+"%";

        time.innerText =
            format(cur)
            +" / "+
            format(dur);

    },150);

}

/* play */

function playVideo(){

    player.playVideo();

    playing=true;

    playIcon.innerHTML="⏸";
    bigplay.innerHTML="⏸";

}

function pauseVideo(){

    player.pauseVideo();

    playing=false;

    playIcon.innerHTML="▶";
    bigplay.innerHTML="▶";

}

function togglePlay(){

    if(playing){

        pauseVideo();

    }else{

        playVideo();

    }

}

play.onclick=togglePlay;
bigplay.onclick=togglePlay;

/* click */

wrap.addEventListener("click",(e)=>{

    if(
        e.target.id==="player" ||
        e.target.id==="wrap"
    ){
        togglePlay();
    }

});

/* long press 2x */

function startHold(){

    holdTimeout=setTimeout(()=>{

        holdSpeeding=true;

        prevSpeed=player.getPlaybackRate();

        player.setPlaybackRate(2);

        statusBox.innerHTML=
            "⚡ 2x SPEED";

        statusBox.classList.add("fast");

    },300);

}

function stopHold(){

    clearTimeout(holdTimeout);

    if(holdSpeeding){

        player.setPlaybackRate(prevSpeed);

        holdSpeeding=false;

        updateStatus();

    }

}

wrap.addEventListener("mousedown",startHold);
wrap.addEventListener("mouseup",stopHold);
wrap.addEventListener("mouseleave",stopHold);

wrap.addEventListener("touchstart",startHold);
wrap.addEventListener("touchend",stopHold);

/* mute */

mute.onclick=()=>{

    if(player.isMuted()){

        player.unMute();

        muteIcon.innerHTML="🔊";

    }else{

        player.mute();

        muteIcon.innerHTML="🔇";

    }

};

/* volume */

volume.oninput=(e)=>{

    player.setVolume(e.target.value);

};

/* progress */

progressArea.onclick=(e)=>{

    const rect =
        progressArea.getBoundingClientRect();

    const x =
        e.clientX - rect.left;

    const per =
        x / rect.width;

    player.seekTo(
        player.getDuration()*per,
        true
    );

};

/* fullscreen */

fullscreen.onclick=()=>{

    if(!document.fullscreenElement){

        wrap.requestFullscreen();

    }else{

        document.exitFullscreen();

    }

};

/* settings */

settingsBtn.onclick=()=>{

    settings.classList.toggle("active");

};

/* speed */

speed.onchange=(e)=>{

    const val =
        Number(e.target.value);

    player.setPlaybackRate(val);

    updateStatus();

};

/* status */

function updateStatus(){

    const speed =
        player.getPlaybackRate();

    if(speed===1){

        statusBox.innerHTML=
            "NORMAL";

        statusBox.classList.remove("fast");

    }else{

        statusBox.innerHTML=
            `⚡ ${speed}x SPEED`;

        statusBox.classList.add("fast");

    }

}

/* keyboard */

document.addEventListener("keydown",(e)=>{

    if(e.code==="Space"){

        e.preventDefault();

        togglePlay();

    }

    if(e.code==="ArrowRight"){

        player.seekTo(
            player.getCurrentTime()+5,
            true
        );

    }

    if(e.code==="ArrowLeft"){

        player.seekTo(
            player.getCurrentTime()-5,
            true
        );

    }

    if(e.code==="KeyM"){

        mute.click();

    }

    if(e.code==="KeyF"){

        fullscreen.click();

    }

});

/* format */

function format(sec){

    sec=Math.floor(sec);

    const m=
        Math.floor(sec/60);

    const s=
        sec%60;

    return `${m}:${String(s).padStart(2,"0")}`;

}

</script>

</body>
</html>
